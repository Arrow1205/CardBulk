<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="stylesheet" href="assets/app.css">
    <title>CardVault — Accueil</title>
</head>
<body>
    <div class="page active" id="page-home">
        <div class="home-hero">
            <div class="home-count" id="home-count">0 cartes</div>
            <div class="home-total" id="home-total">0.00 €</div>
        </div>
        <div class="fav-carousel" id="fav-carousel"></div>
        <div class="sec-title">Derniers ajouts</div>
        <div class="cards-list" id="recent-list"></div>
    </div>

    <script src="assets/app.js"></script>

    <script>
        window.addEventListener('dbReady', () => {
            const cards = window.db.cards || [];
            document.getElementById('home-count').textContent = `${cards.length} cartes`;
            
            // Remplissage du carousel
            const favs = cards.filter(c => c.fav);
            const carousel = document.getElementById('fav-carousel');
            if(carousel && favs.length > 0) {
                carousel.innerHTML = favs.map(c => `
                    <div class="fav-card" onclick="location.href='card.html?id=${c.id}'">
                        <img src="${c.photo_url || ''}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;">
                    </div>
                `).join('');
            }

            // Remplissage des 5 derniers ajouts
            const recentList = document.getElementById('recent-list');
            if(recentList) {
                recentList.innerHTML = cards.slice(0, 5).map(c => `
                    <div class="list-item" onclick="location.href='card.html?id=${c.id}'">
                        <div class="list-thumb"><img src="${c.photo_url || ''}"></div>
                        <div class="list-info">
                            <div class="list-name">${c.prenom || ''} ${c.nom || ''}</div>
                            <div class="list-meta">${c.marque || ''}</div>
                        </div>
                    </div>
                `).join('');
            }
        });
    </script>
</body>
</html>
