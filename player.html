<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="assets/app.css">
<title>CardVault — Joueur</title>
</head>
<body>
<section class="view">
  <div class="hero-name"><div id="view-player-name"></div></div>
  <div class="colls-grid" id="player-cards-grid"></div>
</section>

<script src="assets/app.js"></script>
<script>
    window.addEventListener('dbReady', () => {
        const name = new URLSearchParams(window.location.search).get('name');
        if(!name) return;
        document.getElementById('view-player-name').textContent = name;
        const grid = document.getElementById('player-cards-grid');
        const filtered = window.db.cards.filter(c => ((c.prenom || '') + ' ' + (c.nom || '')).trim() === name);
        if(grid) grid.innerHTML = filtered.map(c => `
            <div class="coll-thumb" onclick="location.href='card.html?id=${c.id}'">
                <img src="${c.photo_url || ''}">
            </div>
        `).join('');
    });
</script>
</body>
</html>
