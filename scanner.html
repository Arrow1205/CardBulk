<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="assets/app.css">
<title>CardVault — Scanner</title>
</head>
<body>
<div class="page active">
  <div class="page-inner">
    <div class="scanner-title" id="scanner-main-title">Ajouter</div>
    <div style="padding:20px;">
      <div class="form-group"><label>Prénom</label><input class="form-input" id="f-prenom" type="text"></div>
      <div class="form-group"><label>Nom</label><input class="form-input" id="f-nom" type="text"></div>
      <div class="form-group"><label>Sport</label><input class="form-input" id="f-sport" type="text"></div>
      <div class="form-group"><label>Marque</label><input class="form-input" id="f-marque" type="text"></div>
      <div class="form-group"><label>Prix (€)</label><input class="form-input" id="f-price" type="number" step="0.01"></div>
      <button class="btn-primary" id="save-card-btn" onclick="saveCard()">Enregistrer</button>
    </div>
  </div>
</div>

<script src="assets/app.js"></script>
<script>
    const editId = new URLSearchParams(window.location.search).get('edit');

    window.addEventListener('dbReady', () => {
        if(editId) {
            const c = window.db.cards.find(x => String(x.id) === String(editId));
            if(c) {
                document.getElementById('f-prenom').value = c.prenom || "";
                document.getElementById('f-nom').value = c.nom || "";
                document.getElementById('f-sport').value = c.sport || "";
                document.getElementById('f-marque').value = c.marque || "";
                document.getElementById('f-price').value = c.price || 0;
                document.getElementById('scanner-main-title').textContent = "Modifier";
                document.getElementById('save-card-btn').textContent = "Mettre à jour";
            }
        }
    });

    async function saveCard() {
        const data = {
            prenom: document.getElementById('f-prenom').value.trim(),
            nom: document.getElementById('f-nom').value.trim(),
            sport: document.getElementById('f-sport').value,
            marque: document.getElementById('f-marque').value,
            price: parseFloat(document.getElementById('f-price').value) || 0
        };

        try {
            if(editId) {
                await sbUpdate("cards", editId, data);
                location.href = `card.html?id=${editId}`;
            } else {
                // Logique sbInsert ici pour les nouvelles cartes
                location.href = 'collection.html';
            }
        } catch(e) { alert("Erreur"); }
    }
</script>
</body>
</html>
